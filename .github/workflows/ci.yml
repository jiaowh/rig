# CI stub (implementation-plan §13.3): ruff + import-linter boundary + pytest.
# Matrix grows to {python}x{adapter} as adapters land (WP-B+).
#
# NOTE (audit A1, 2026-07-16): the sibling `mbe_sim` repo is NOT pip-installable
# and is not checked out here, so the ~41 MBE sim-integration tests SKIP on hosted
# runners (`-rs` below surfaces them in the log, and tests/conftest.py prints a
# banner). To cover that layer, run on a machine that has the sim with
# `MBE_SIM_PATH` set and `RIG_REQUIRE_MBE_SIM=1` (a missing sim then hard-fails).
name: ci

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest]
        python-version: ["3.12"]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      - name: Install
        run: python -m pip install -e ".[dev]"
      - name: Lint
        run: python -m ruff check src tests
      - name: Format check (ruff format is the formatter of record, adopted 2026-07-17)
        run: python -m ruff format --check .
      - name: Import boundary (core must not import adapters)
        run: lint-imports
      - name: Tests
        # -rs surfaces skip reasons so the skipped MBE sim layer is visible
        # (audit A1). conftest.py also prints a banner when the sim did not run.
        run: python -m pytest tests/ -q -rs
