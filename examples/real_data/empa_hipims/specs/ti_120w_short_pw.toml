# Process spec for the Empa bipolar-HiPIMS campaign "Ti - 120 W - short PW"
# (WP-H tabular adapter; data file: csv/ti_120w_short_pw.csv from prepare_empa.py).
#
# Provenance: Zenodo record 10.5281/zenodo.18495402 (CC-BY-4.0); Wieczorek et
#   al., Digital Discovery 2026, DOI 10.1039/D6DD00063K. Real Empa sputter tool
#   -> ingest with source = "real_tool".
# Bounds: transcribed VERBATIM from this campaign's own BayBE search space
#   ("Ti - 120 W - short PW__Campaign.json", NumericalContinuousParameter
#   bounds) -- each campaign has its OWN Campaign.json; do not reuse across specs.
#
# THIS CAMPAIGN IS THE ODD ONE OUT -- three verified quirks:
# 1. Its bounds are NOT the round numbers of the Al short-PW campaign: they
#    equal the observed data extents at full float precision (the campaign
#    state was evidently rebuilt from the data). Transcribed verbatim anyway.
# 2. The df_campaign JSON rounds values to 10 decimals while the bounds keep
#    full precision, so 5 of 495 rows sit 3e-11 to 4e-11 OUTSIDE these bounds. The
#    ingest bounds check is exact (no tolerance): on_error="raise" fails on
#    them; on_error="skip" ingests 490 and rejects exactly those 5
#    (documented + asserted in tests/test_empa_ingest.py). The raw data was
#    NOT clamped to hide this.
# 3. Every row has BatchNr == 1 and FitNr == null -- BatchNr carries NO
#    run-order information here; the tidy CSV keeps the raw file order.
#
# HONEST CAVEATS:
# - BO-driven sampling (BayBE): rows CLUSTER near high-deposition-rate optima,
#   they are NOT space-filling over this box. Conformal/i.i.d. assumptions are
#   approximations on this data.
# - "Ipk (A)" is peak current, MEASURED but never set ("not controlled in the
#   Bayesian optimization (only measured)" -- paper). It is an output here.
# - Column names: the adapter reserves '.' in variable names, so the raw
#   "pos. *" headers were renamed by dropping the dot (prepare_empa.RENAMES).
# - Raw "y1" (uncalibrated rate) plus "BatchNr"/"FitNr" are deliberately NOT
#   declared: the adapter parks them in RunRecord.extra["unmatched_columns"].
#
# Units: pint parses "us" as microsecond (SI x1e-6 s) and "angstrom/second"
# SI-canonicalizes to m/s (x1e-10).

process_id = "empa_hipims_ti_120w_short_pw"
description = "Empa bipolar HiPIMS, Ti target, 120 W, short-PW campaign (BayBE-sampled): 5 pulse knobs -> calibrated deposition rate + measured peak current. Real measured data; machinery validation only."

# --- inputs: the 5 continuous pulse knobs of THIS campaign ------------------
# Full-precision bounds verbatim from Campaign.json (see header quirk 1).

[inputs."PRR (Hz)"]
kind = "continuous"
unit = "Hz"
lower = 603.2242871820927
upper = 4996.414182707667

[inputs."PW (us)"]
kind = "continuous"
unit = "us"             # pint: microsecond (1e-6 s)
lower = 5.001815874129534
upper = 99.99892953317612

[inputs."pos Delay (us)"]
kind = "continuous"
unit = "us"
lower = 1.5019527850672603
upper = 39.976193534210324

[inputs."pos PW (us)"]
kind = "continuous"
unit = "us"
lower = 0.0006786361336708069
upper = 39.98307667672634

[inputs."pos Setpoint (V)"]
kind = "continuous"
unit = "V"
lower = 0.05101468414068222
upper = 99.9784872867167

# --- outputs ----------------------------------------------------------------
# dep_rate_A_per_s = y1 * per-campaign calibration factor (read from
# calibration.txt at prep time), in angstrom/second -> SI m/s (x1e-10).

[outputs.dep_rate_A_per_s]
unit = "angstrom/second"

[outputs."Ipk (A)"]
unit = "A"              # measured-not-set peak current (see header)

# --- cost model: left at documented defaults (not used by data prep) ---------
[cost]
c_batch = 1000.0
c_recipe = 1000.0
batch_size = 4
